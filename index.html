<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EliteStream Access</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <main class="page">
    <section class="card" id="card">
      <span class="badge">ELITESTREAM</span>
      <h1>Obtener Acceso</h1>
      <p class="lead">
        Si llegaste desde Linkvertise, toca el boton para generar tu enlace unico.
        Ese enlace solo se puede usar una vez.
      </p>

      <button id="generateButton" class="primary-button">
        Generar Enlace
      </button>

      <p id="status" class="status">Esperando verificacion...</p>

      <div id="linkBox" class="link-box hidden">
        <p class="link-label">Tu enlace unico es:</p>
        <div id="linkText" class="link-text"></div>
        <button id="copyButton" class="secondary-button">Copiar Enlace</button>
      </div>
    </section>
  </main>
</body>
</html>
